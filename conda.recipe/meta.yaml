{% set name = "huxt" %}
{% set version = "5.0.0" %}

package:
  name: {{ name|lower}}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{PYTHON}} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python ==3.12.11
    - appdirs ==1.4.4
    - astropy ==7.1.0
    - dtaidistance ==2.3.13
    - h5py ==3.14.0
    - httplib2 ==0.30.0
    - imageio ==2.37.0
    - imageio-ffmpeg ==0.6.0
    - jupyterlab ==4.4.7
    - matplotlib ==3.10.6
    - numba ==0.61.2
    - numpy ==2.2.6
    - pandas ==2.3.2
    - pyhdf ==0.11.6
    - requests ==2.32.5
    - scipy ==1.16.1
    - sunpy ==7.0.1
  run:
    - python ==3.12.11
    - appdirs ==1.4.4
    - astropy ==7.1.0
    - dtaidistance ==2.3.13
    - h5py ==3.14.0
    - httplib2 ==0.30.0
    - imageio ==2.37.0
    - imageio-ffmpeg ==0.6.0
    - jupyterlab ==4.4.7
    - matplotlib ==3.10.6
    - numba ==0.61.2
    - numpy ==2.2.6
    - pandas ==2.3.2
    - pyhdf ==0.11.6
    - requests ==2.32.5
    - scipy ==1.16.1
    - sunpy ==7.0.1
