[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "huxt"
version = "4.2.0"
description = "HUXt: A lightweight solar wind model"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
    { name = "Luke Barnard", email = "luke.barnard@reading.ac.uk" },
    { name = "Mathew Owens", email = "m.j.owens@reading.ac.uk" }
]
dependencies = [
    "astropy>=6.0.1",
    "dtaidistance>=2.3.1",
    "h5py>=3.11",
    "httplib2>=0.22",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.5.1",
    "matplotlib>=3.9",
    "numba>=0.60",
    "numpy>=1.26",
    "packaging>=24.0",
    "pandas>=2.2",
    "pyhdf>=0.11",
    "requests>=2.32",
    "scipy>=1.13",
    "sunpy>=5.1"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "jupyterlab"
]

[tool.setuptools.packages.find]
include = ["huxt"]
exclude = ["notebooks*", "data*", "figures*", "configs*"]

[tool.setuptools.package-data]
huxt = [
    "config.dat",
    "data/boundary_conditions/*",
    "data/ephemeris/*",
    "figures/*"
]
